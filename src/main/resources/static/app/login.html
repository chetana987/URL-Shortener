<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon"><i class="fas fa-link"></i></div>
            <h3>Welcome Back</h3>
            <p>Sign in to manage your short URLs</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" id="email" placeholder="user@example.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>
            </div>
            <div class="alert alert-danger d-none" id="loginError"></div>
            <button type="submit" class="btn btn-primary w-100 py-2 mt-3" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/app/signup.html" class="text-decoration-none fw-bold" style="color:var(--primary);">Sign Up</a>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3" style="margin-top:2rem;">
    <p class="mb-1 small">&copy; 2026 URL Shortener | Developed by Chetana Mahajan using Spring Boot &amp; Bootstrap.</p>
    <div class="d-flex justify-content-center gap-3 small">
        <a href="https://www.linkedin.com/in/chetanamahajan" target="_blank" class="text-white text-decoration-none" title="LinkedIn">
            <i class="fab fa-linkedin fa-lg"></i> LinkedIn
        </a>
        <a href="https://github.com/chetana987" target="_blank" class="text-white text-decoration-none" title="GitHub">
            <i class="fab fa-github fa-lg"></i> GitHub
        </a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    errorEl.classList.add('d-none');
    Utils.setLoading(btn, true);
    try {
        const response = await API.login({ email, password });
        API.setToken(response.data.token);
        API.setRefreshToken(response.data.refreshToken);
        const params = Utils.getUrlParams();
        const redirect = params.redirect || '/app/dashboard.html';
        Utils.showToast('Login successful!');
        setTimeout(() => window.location.href = redirect, 500);
    } catch (error) {
        errorEl.textContent = error.message || 'Invalid email or password';
        errorEl.classList.remove('d-none');
        Utils.setLoading(btn, false);
    }
});
</script>

</body>
</html>
