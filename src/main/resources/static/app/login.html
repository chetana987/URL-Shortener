<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ShortLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%233B82F6'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-weight='800' font-family='Inter'%3ES%3C/text%3E%3C/svg%3E">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="/app/index.html" class="auth-logo">
            <span class="nav-brand-icon">S</span>
            ShortLink
          </a>
          <h1>Welcome back</h1>
          <p>Sign in to manage your links and analytics</p>
        </div>
        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-input" placeholder="name@company.com" required autofocus>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
          </div>
          <div class="auth-error" id="loginError"></div>
          <button type="submit" id="loginBtn" class="btn btn-primary btn-block btn-lg">
            <span id="loginBtnText">Sign In</span>
            <span id="loginLoading" class="spinner" style="display:none"></span>
          </button>
        </form>
        <div class="form-footer" style="margin-top:20px">
          Don't have an account? <a href="/app/signup.html">Create one</a>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const error = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      const loading = document.getElementById('loginLoading');

      if (!email || !password) {
        error.textContent = 'Please fill in all fields';
        error.classList.add('visible');
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'Signing in...';
      loading.style.display = 'inline-block';
      error.classList.remove('visible');

      try {
        const data = await API.login(email, password);
        if (data.success) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('refreshToken', data.data.refreshToken);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          window.location.href = '/app/dashboard.html';
        } else {
          error.textContent = data.message || 'Invalid email or password';
          error.classList.add('visible');
        }
      } catch (err) {
        error.textContent = err.message || 'An error occurred';
        error.classList.add('visible');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Sign In';
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
