<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon"><i class="fas fa-user-plus"></i></div>
            <h3>Create Account</h3>
            <p>Sign up to start shortening URLs</p>
        </div>

        <form id="signupForm">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="firstName" placeholder="John">
                </div>
                <div class="col-md-6">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="lastName" placeholder="Doe">
                </div>
            </div>
            <div class="mb-3 mt-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" id="email" placeholder="user@example.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="At least 8 characters" required minlength="8">
                </div>
                <small class="text-muted">Must contain uppercase, lowercase, digit, and special character</small>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-check-circle"></i></span>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required>
                </div>
            </div>
            <div class="alert alert-danger d-none" id="signupError"></div>
            <button type="submit" class="btn btn-primary w-100 py-2 mt-3" id="signupBtn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/app/login.html" class="text-decoration-none fw-bold" style="color:var(--primary);">Sign In</a>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3" style="margin-top:2rem;">
    <p class="mb-1 small">&copy; 2026 URL Shortener | Developed by Chetana Mahajan using Spring Boot &amp; Bootstrap.</p>
    <div class="d-flex justify-content-center gap-3 small">
        <a href="https://www.linkedin.com/in/chetanamahajan" target="_blank" class="text-white text-decoration-none" title="LinkedIn">
            <i class="fab fa-linkedin fa-lg"></i> LinkedIn
        </a>
        <a href="https://github.com/chetana987" target="_blank" class="text-white text-decoration-none" title="GitHub">
            <i class="fab fa-github fa-lg"></i> GitHub
        </a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const errorEl = document.getElementById('signupError');
    const btn = document.getElementById('signupBtn');
    errorEl.classList.add('d-none');
    if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match';
        errorEl.classList.remove('d-none');
        return;
    }
    Utils.setLoading(btn, true);
    try {
        const data = {
            email: document.getElementById('email').value.trim(),
            password: password,
            firstName: document.getElementById('firstName').value.trim(),
            lastName: document.getElementById('lastName').value.trim(),
        };
        const response = await API.register(data);
        API.setToken(response.data.token);
        API.setRefreshToken(response.data.refreshToken);
        Utils.showToast('Account created successfully!');
        setTimeout(() => window.location.href = '/app/dashboard.html', 500);
    } catch (error) {
        errorEl.textContent = error.message || 'Registration failed';
        errorEl.classList.remove('d-none');
        Utils.setLoading(btn, false);
    }
});
</script>

</body>
</html>
