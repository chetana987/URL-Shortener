<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — ShortLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%233B82F6'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-weight='800' font-family='Inter'%3ES%3C/text%3E%3C/svg%3E">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="/app/index.html" class="auth-logo">
            <span class="nav-brand-icon">S</span>
            ShortLink
          </a>
          <h1>Create your account</h1>
          <p>Get started with ShortLink in seconds</p>
        </div>
        <form id="signupForm" class="auth-form">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" class="form-input" placeholder="John" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" class="form-input" placeholder="Doe" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Create a strong password" required minlength="6">
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat your password" required>
          </div>
          <div class="auth-error" id="signupError"></div>
          <button type="submit" id="signupBtn" class="btn btn-primary btn-block btn-lg">
            <span id="signupBtnText">Create Account</span>
            <span id="signupLoading" class="spinner" style="display:none"></span>
          </button>
        </form>
        <div class="form-footer" style="margin-top:20px">
          Already have an account? <a href="/app/login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const error = document.getElementById('signupError');
      const btn = document.getElementById('signupBtn');
      const btnText = document.getElementById('signupBtnText');
      const loading = document.getElementById('signupLoading');

      if (!firstName || !lastName || !email || !password || !confirmPassword) {
        error.textContent = 'Please fill in all fields';
        error.classList.add('visible');
        return;
      }

      if (password !== confirmPassword) {
        error.textContent = 'Passwords do not match';
        error.classList.add('visible');
        return;
      }

      if (password.length < 6) {
        error.textContent = 'Password must be at least 6 characters';
        error.classList.add('visible');
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'Creating account...';
      loading.style.display = 'inline-block';
      error.classList.remove('visible');

      try {
        const data = await API.register({ firstName, lastName, email, password });
        if (data.success) {
          Utils.showToast('Account created successfully! Please sign in.', 'success');
          setTimeout(() => {
            window.location.href = '/app/login.html';
          }, 1500);
        } else {
          error.textContent = data.message || 'Registration failed';
          error.classList.add('visible');
        }
      } catch (err) {
        error.textContent = err.message || 'An error occurred';
        error.classList.add('visible');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Create Account';
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
