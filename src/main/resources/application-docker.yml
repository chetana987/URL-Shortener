server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST:mysql}:${MYSQLPORT:3306}/${MYSQLDATABASE:url_shortener}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:root}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          batch_versioned_data: true
          fetch_size: 100
          time_zone: UTC
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 100
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: ${REDISHOST:redis}
      port: ${REDISPORT:6379}
      password: ${REDISPASSWORD:}
      timeout: 60000
      lettuce:
        pool:
          max-active: 5
          max-idle: 2
          min-idle: 1
          max-wait: 3000ms

app:
  jwt:
    secret: ${JWT_SECRET:url-shortener-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    refresh-secret: ${JWT_REFRESH_SECRET:url-shortener-refresh-secret-key-for-token-refresh-2024-secure}
    expiration: ${JWT_EXPIRATION:86400000}

  url:
    base-url: ${BASE_URL:http://localhost:8080}
    short-code-length: 7

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.urlshortener: ${APP_LOG_LEVEL:DEBUG}
