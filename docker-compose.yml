version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: url-shortener-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: url_shortener
      MYSQL_USER: ${MYSQL_USER:-urluser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-urlpass}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - url-shortener-net
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+00:00
      --max-allowed-packet=64M

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - url-shortener-net
    command: redis-server --appendonly yes --appendfsync everysec

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: url-shortener:latest
    container_name: url-shortener-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/url_shortener?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-urluser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-urlpass}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-url-shortener-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-url-shortener-refresh-secret-key-for-token-refresh-2024-secure}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-DEBUG}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - url-shortener-net

networks:
  url-shortener-net:
    name: url-shortener-network
    driver: bridge

volumes:
  mysql_data:
    name: url-shortener-mysql-data
  redis_data:
    name: url-shortener-redis-data
